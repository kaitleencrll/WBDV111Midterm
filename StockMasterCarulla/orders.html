<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StockMaster | Order Tracking</title>
    <style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(500%); }
        }
        .nav-item {
            transition: 0.2s ease-in-out;
            border-bottom: 0px solid #f39c12;
        }
        .nav-item:hover {
            background: rgba(243, 156, 18, 0.15) !important;
            color: #fff !important;
            border-bottom: 4px solid #f39c12 !important;
        }
        .action-btn {
            transition: 0.2s;
            cursor: pointer;
        }
        .action-btn:hover {
            background: #f39c12 !important;
            color: #111 !important;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.4);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #111;
        }
        img {
            object-fit: cover;
            border: 1px solid #111;
        }
    </style>
</head>

<body style="margin:0; font-family: 'Segoe UI', sans-serif; background-color:#f0f2f5; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden;">

    <nav style="width: 100%; background: #0a0a0a; height: 65px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #f39c12; z-index: 100; flex-shrink: 0;">
        <div style="padding: 0 30px; display: flex; align-items: center; gap: 15px; position: relative; overflow: hidden;">
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: rgba(243, 156, 18, 0.4); animation: scanline 2s linear infinite;"></div>
            <div style="display: inline-flex; gap: 2px; height: 20px; align-items: flex-end;">
                <div style="width:4px; height:100%; background:#fff;"></div>
                <div style="width:7px; height:100%; background:#f39c12;"></div>
                <div style="width:3px; height:80%; background:#fff;"></div>
            </div>
            <h2 style="margin:0; font-size: 20px; color: #fff; letter-spacing: 3px; font-weight: 900; text-transform: uppercase;">StockMaster</h2>
        </div>

        <div style="display: flex; height: 100%;">
            <a href="index.html" class="nav-item" style="color:#888; text-decoration:none; display:flex; align-items:center; padding:0 40px;">STOCK</a>
            <a href="suppliers.html" class="nav-item" style="color:#888; text-decoration:none; display:flex; align-items:center; padding:0 40px;">SUPPLIERS</a>
            <a href="orders.html" class="nav-item" style="color:#f39c12; text-decoration:none; display:flex; align-items:center; padding:0 40px; font-weight:700; background:rgba(243, 156, 18, 0.1); border-bottom: 4px solid #f39c12;">ORDERS</a>
            <a href="reports.html" class="nav-item" style="color:#888; text-decoration:none; display:flex; align-items:center; padding:0 40px;">REPORTS</a>
            <a href="login.html" class="nav-item" style="color:#fff; text-decoration:none; display:flex; align-items:center; padding:0 40px; font-weight: 800; background: #222;">LOG IN</a>
        </div>
    </nav>

    <div style="flex-grow: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box;">
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px; flex-shrink: 0;">
            <div style="display: flex; align-items: baseline; gap: 15px;">
                <h1 style="margin:0; font-size: 26px; font-weight:900; text-transform:uppercase; letter-spacing: -1px;">Active Orders</h1>
                <span style="color:#f39c12; font-weight:bold; font-size: 11px; font-family: monospace;">● TRACKING_LIVE</span>
            </div>
            <button class="action-btn" onclick="window.location.href='reports.html'" style="padding:12px 30px; background:#111; color:#f39c12; border:none; font-weight:900; font-size:12px; text-transform:uppercase; border-bottom: 3px solid #f39c12;">
                + Create Order
            </button>
        </div>

        <div style="background:white; border:2px solid #111; flex-grow: 1; overflow-y: auto; box-shadow: 10px 10px 0px rgba(0,0,0,0.05);">
            <table style="width:100%; border-collapse:collapse; text-align:left; font-size: 15px;">
                <thead style="background:#111; color:#fff; position: sticky; top: 0; z-index: 10;">
                    <tr>
                        <th style="padding:18px 25px; width: 100px;">Visual</th>
                        <th style="padding:18px 25px;">Order Details</th>
                        <th style="padding:18px 25px; width: 150px;">Order Qty</th>
                        <th style="padding:18px 25px; width: 150px;">Status</th>
                        <th style="padding:18px 25px; text-align: center; width: 200px;">System Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="border-bottom:1px solid #eee;" onmouseover="this.style.background='#f9f9f9'" onmouseout="this.style.background='white'">
                        <td style="padding:10px 25px;"><img src="https://boholonlinestore.com/wp-content/uploads/2017/01/nestle_fresh_milk_1l.jpg" style="width:60px; height:60px;"></td>
                        <td style="padding:10px 25px;"><span style="font-size: 18px; font-weight: 800;">Fresh Milk 1L</span><br><small style="color:#aaa;">ORD-1001</small></td>
                        <td style="padding:10px 25px; font-family: monospace; font-size: 20px; font-weight: bold;">24</td>
                        <td style="padding:10px 25px; color:orange; font-weight: bold;">PENDING</td>
                        <td style="padding:10px 25px; text-align: center;"><button class="action-btn" onclick="window.location.href='reports.html'" style="background:#111; color:#fff; border:none; padding:10px 25px; font-weight:900; font-size:11px; text-transform:uppercase;">View Report</button></td>
                    </tr>
                    <tr style="border-bottom:1px solid #eee;" onmouseover="this.style.background='#f9f9f9'" onmouseout="this.style.background='white'">
                        <td style="padding:10px 25px;"><img src="https://img.freepik.com/free-photo/whole-wheat-bread-white_1339-8026.jpg" style="width:60px; height:60px;"></td>
                        <td style="padding:10px 25px;"><span style="font-size: 18px; font-weight: 800;">Artisan Bread</span><br><small style="color:#aaa;">ORD-1002</small></td>
                        <td style="padding:10px 25px; font-family: monospace; font-size: 20px; font-weight: bold;">50</td>
                        <td style="padding:10px 25px; color:green; font-weight: bold;">DELIVERED</td>
                        <td style="padding:10px 25px; text-align: center;"><button class="action-btn" onclick="window.location.href='reports.html'" style="background:#111; color:#fff; border:none; padding:10px 25px; font-weight:900; font-size:11px; text-transform:uppercase;">Full Report</button></td>
                    </tr>
                    <tr style="border-bottom:1px solid #eee;" onmouseover="this.style.background='#f9f9f9'" onmouseout="this.style.background='white'">
                        <td style="padding:10px 25px;"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQkwruo_TlQJ3QTH4ELUPoJuhHovchcdTCz_A&s" style="width:60px; height:60px;"></td>
                        <td style="padding:10px 25px;"><span style="font-size: 18px; font-weight: 800;">Organic Oranges</span><br><small style="color:#aaa;">ORD-1003</small></td>
                        <td style="padding:10px 25px; font-family: monospace; font-size: 20px; font-weight: bold;">100</td>
                        <td style="padding:10px 25px; color:orange; font-weight: bold;">PENDING</td>
                        <td style="padding:10px 25px; text-align: center;"><button class="action-btn" onclick="window.location.href='reports.html'" style="background:#111; color:#fff; border:none; padding:10px 25px; font-weight:900; font-size:11px; text-transform:uppercase;">View Report</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="padding: 15px; text-align: center; color: #999; font-size: 10px; letter-spacing: 4px; font-weight: 800;">
            ORDER_LOGS // NODE_ACTIVE // SECURE_ACCESS
        </div>
    </div>

</body>
</html>
