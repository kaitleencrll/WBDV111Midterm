<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StockMaster | Secure Authentication</title>
    <style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(1000%); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card {
            background: #000;
            padding: 50px;
            width: 350px;
            border: 2px solid #333;
            text-align: center;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: #f39c12;
            animation: scanline 3s linear infinite;
            opacity: 0.5;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #f39c12;
            background: #1a1a1a;
        }
        .login-btn {
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            background: #f39c12;
            border: none;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-btn:hover {
            background: #fff;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.4);
        }
    </style>
</head>

<body style="margin:0; font-family: 'Segoe UI', sans-serif; background-color:#111; background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 30px 30px; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div class="login-card">
        <!-- Industrial Logo -->
        <div style="display: inline-flex; gap: 3px; height: 35px; margin-bottom: 20px; align-items: flex-end;">
            <div style="width:6px; height:100%; background:#fff;"></div>
            <div style="width:10px; height:100%; background:#f39c12;"></div>
            <div style="width:4px; height:80%; background:#fff;"></div>
        </div>

        <h1 style="margin:0; color:#fff; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; font-weight: 900;">StockMaster</h1>
        <p style="color:#666; font-size: 11px; letter-spacing: 2px; margin-top: 5px; font-weight: bold;">INDUSTRIAL ACCESS TERMINAL</p>

        <form style="margin-top: 30px;">
            <input type="text" placeholder="OPERATOR ID" required>
            <input type="password" placeholder="ACCESS KEY" required>

            <a href="index.html" style="text-decoration: none;">
                <button type="button" class="login-btn">Initialize Session</button>
            </a>
        </form>

        <div style="margin-top: 40px; color: #444; font-size: 10px; font-family: monospace; letter-spacing: 1px;">
            SECURE ENCRYPTION ACTIVE<br>
            UNAUTHORIZED ACCESS IS LOGGED
        </div>
    </div>

</body>
</html>
