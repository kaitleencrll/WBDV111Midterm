<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <style>
        :root {
            --primary: #2d1b4e; 
            --accent: #9d72ff; 
            --neon: #bc13fe;
            --nav-bg: #0f081a;
            --main-bg: #e9e2ff; 
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--main-bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: var(--nav-bg);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }

        .logo-box {
            padding: 40px 20px;
            text-align: center;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--white);
            text-transform: uppercase;
        }

        .logo-text span {
            background: var(--accent);
            color: var(--white);
            padding: 0px 8px;
            border-radius: 4px;
            margin-left: 4px;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            padding: 0 10px;
        }

        .sidebar nav a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 0 50px 50px 0;
            transition: 0.4s ease;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 2px;
        }

        .sidebar nav a:hover {
            background: rgba(157, 114, 255, 0.1);
            color: var(--accent);
            padding-left: 35px;
        }

        .sidebar nav a.active {
            background: linear-gradient(90deg, var(--accent), transparent);
            color: var(--white);
            border-left: 4px solid var(--neon);
        }

        .ad-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            margin-top: 20px;
            overflow: hidden;
        }

        .nav-portrait {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-top: 3px solid var(--neon);
            filter: brightness(0.6);
        }

        .ad-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 40px 20px;
            background: linear-gradient(transparent, rgba(15, 8, 26, 0.95));
            box-sizing: border-box;
            text-align: center;
        }

        .ad-overlay h4 { color: var(--white); margin: 0; font-size: 20px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon); }

        .main-content {
            flex-grow: 1;
            padding: 50px;
            overflow-y: auto;
        }

        .cart-card {
            background: var(--white);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(45, 27, 78, 0.1);
            max-width: 900px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid var(--main-bg);
            color: var(--primary);
            font-size: 18px;
        }

        td {
            padding: 20px 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 16px;
        }

        .remove-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .remove-btn:hover { background: #cc0000; }

        .cart-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid var(--main-bg);
            padding-top: 30px;
        }

        .total-box h2 {
            margin: 0;
            color: var(--primary);
        }

        .total-box span {
            color: var(--accent);
            font-size: 32px;
            font-weight: 800;
        }

        .actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-clear { background: #eee; color: #666; }
        .btn-clear:hover { background: #ddd; }

        .btn-checkout {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(45, 27, 78, 0.2);
        }

        .btn-checkout:hover {
            background: var(--neon);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(188, 19, 254, 0.4);
        }

        .empty-msg {
            text-align: center;
            padding: 50px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-box">
            <div class="logo-text">SWIFT<span>CART</span></div>
        </div>
        <nav>
            <a href="index.html">📦 Catalog</a>
            <a href="cart.html" class="active">🛒 My Cart</a>
            <a href="checkout.html">💳 Checkout</a>
            <a href="login.html">👤 Account</a>
        </nav>
        <div class="ad-container">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQQsGP3ksIAyFqp8sW4zjng78T5A1qcM2CylQ&s" class="nav-portrait" alt="Magazine Ad">
            <div class="ad-overlay">
                <h4>SHOPPING BAG</h4>
             
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="cart-card">
            <h1 style="color: var(--primary); margin-bottom: 30px;">Shopping Bag</h1>
            
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cartItems"></tbody>
            </table>

            <div id="emptyDisplay" class="empty-msg" style="display:none;">
                <p>Your cart is empty. Start shopping!</p>
            </div>

            <div class="cart-footer">
                <div class="total-box">
                    <h2>Total: <span id="totalDisplay">₱0</span></h2>
                </div>
                <div class="actions">
                    <button class="btn btn-clear" onclick="clearCart()">Clear</button>
                    <button class="btn btn-checkout" onclick="goToCheckout()">Checkout</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let container = document.getElementById("cartItems");
            let emptyMsg = document.getElementById("emptyDisplay");
            let total = 0;
            
            container.innerHTML = "";

            if (cart.length === 0) {
                emptyMsg.style.display = "block";
            } else {
                emptyMsg.style.display = "none";
                cart.forEach((item, index) => {
                    let row = `
                        <tr>
                            <td><strong>${item.name}</strong></td>
                            <td style="color: var(--accent); font-weight: bold;">₱${item.price.toLocaleString()}</td>
                            <td><button class="remove-btn" onclick="removeItem(${index})">Remove</button></td>
                        </tr>
                    `;
                    container.innerHTML += row;
                    total += item.price;
                });
            }

            document.getElementById("totalDisplay").innerText = "₱" + total.toLocaleString();
            localStorage.setItem("totalPrice", total);
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function clearCart() {
            if(confirm("Clear all items?")) {
                localStorage.removeItem("cart");
                loadCart();
            }
        }

        function goToCheckout() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            if(cart.length === 0) {
                alert("Cart is empty!");
                return;
            }
            window.location = "checkout.html";
        }

        window.onload = loadCart;
    </script>
</body>
</html>
