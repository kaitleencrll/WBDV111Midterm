<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        :root {
            --maroon: #600000;
            --beige: #f5f5dc;
            --white: #ffffff;
            --cream: #fffdd0;
            --neon: #ff3131;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--beige);
            color: var(--maroon);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--maroon);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .logo-container {
            text-align: center;
            line-height: 0.8;
        }

        .logo-main {
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px var(--neon);
        }

        .logo-sub {
            font-family: 'Brush Script MT', cursive;
            font-size: 32px;
            color: var(--cream);
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        .nav-links a, .nav-btn {
            padding: 10px 20px;
            background: var(--white);
            color: var(--maroon);
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-btn:hover {
            background: var(--maroon);
            color: var(--white);
            border-color: var(--neon);
            box-shadow: 0 0 15px var(--neon);
        }

        #account-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
        }

        .account-card {
            background: linear-gradient(145deg, rgba(128, 0, 0, 0.9), rgba(64, 0, 0, 0.95));
            border: 2px solid var(--white);
            padding: 50px 40px;
            border-radius: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 40px var(--neon), inset 0 0 20px rgba(255,255,255,0.1);
            position: relative;
        }

        .account-card::after {
            content: '';
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px dashed rgba(255,255,255,0.3);
            border-radius: 30px;
            pointer-events: none;
        }

        .account-card h2 {
            font-family: 'Georgia', serif;
            color: var(--white);
            letter-spacing: 10px;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-size: 32px;
            font-weight: 900;
            text-shadow: 2px 2px 0px var(--neon);
        }

        .account-card input {
            width: 100%;
            padding: 16px 25px;
            margin: 12px 0;
            border-radius: 0;
            border: none;
            border-bottom: 2px solid var(--white);
            background: rgba(255,255,255,0.1);
            box-sizing: border-box;
            color: var(--white);
            font-weight: bold;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .account-card input::placeholder {
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
        }

        .account-card input:focus {
            background: rgba(255,255,255,0.2);
            border-bottom-color: var(--neon);
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            margin-top: 35px;
            background: var(--white);
            color: var(--maroon);
            border: none;
            border-radius: 0;
            font-weight: 900;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 3px;
            box-shadow: 5px 5px 0px var(--neon);
        }

        .action-btn:hover {
            background: var(--neon);
            color: var(--white);
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0px var(--white);
        }

        .banner-frame {
            width: 94%;
            margin: 20px auto;
            height: 400px;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            border: 4px solid var(--maroon);
        }

        #banner {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(96,0,0,0.8), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            color: var(--white);
        }

        .shop-now-btn {
            width: fit-content;
            padding: 12px 30px;
            background: var(--cream);
            color: var(--maroon);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            margin-top: 15px;
            transition: 0.3s;
        }

        .shop-now-btn:hover {
            box-shadow: 0 0 20px var(--white);
            transform: scale(1.05);
        }

        .grid-wrapper {
            width: 96%;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 15px;
            padding-bottom: 80px;
        }

        .cake-card {
            background: var(--white);
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid #ddd;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .cake-card:hover {
            border-color: var(--neon);
            box-shadow: 0 0 40px var(--neon);
            transform: translateY(-10px);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            border-bottom: 8px solid var(--maroon);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cake-info {
            padding: 30px;
            text-align: center;
        }

        .tag-pill {
            display: inline-block;
            background: var(--maroon);
            color: var(--cream);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .cake-name {
            font-family: 'Georgia', serif;
            font-size: 26px;
            font-weight: 900;
            margin: 0;
            color: var(--maroon);
        }

        .cake-details {
            font-size: 14px;
            color: #777;
            margin: 15px 0;
            font-weight: 500;
            background: var(--beige);
            padding: 8px;
            border-radius: 15px;
        }

        .cake-price {
            font-size: 36px;
            font-weight: 900;
            color: var(--maroon);
            margin: 15px 0;
            display: block;
            text-shadow: 1px 1px 0px var(--neon);
        }

        .add-btn {
            width: 100%;
            padding: 18px;
            background: var(--maroon);
            color: var(--white);
            border: none;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
            letter-spacing: 2px;
            box-shadow: 0 6px 0px #400000;
        }

        .add-btn:hover {
            background: var(--neon);
            box-shadow: 0 0 25px var(--neon);
            transform: translateY(-2px);
        }

        .section-title {
            width: 94%;
            margin: 20px auto;
            border-left: 12px solid var(--maroon);
            padding-left: 20px;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo-container">
        <div class="logo-main">Velvet Crust</div>
        <div class="logo-sub">Cakes</div>
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <button class="nav-btn" onclick="openAccount()">Account</button>
    </div>
</nav>

<div id="account-modal">
    <div class="account-card">
        <h2>ACCOUNT</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button class="action-btn">SIGN IN</button>
        <p onclick="closeAccount()" style="margin-top:30px; color:white; cursor:pointer; font-size:11px; letter-spacing:3px; font-weight: 900; text-transform: uppercase;">[ Close ]</p>
    </div>
</div>

<div class="banner-frame">
    <img id="banner" src="https://static0.gamerantimages.com/wordpress/wp-content/uploads/2023/06/genshin-impact-all-playable-character-birthdays.jpg">
    <div class="banner-overlay">
        <h1 style="margin:0; font-size:50px; text-shadow: 3px 3px 10px rgba(0,0,0,0.5);">Signature Collections</h1>
        <a href="shop.html" class="shop-now-btn">Browse the Shop</a>
    </div>
</div>

<h2 class="section-title">Trending This Week</h2>

<div class="grid-wrapper" id="trend"></div>

<script>
    const banners = [
        "https://www.goodsmileus.com/cdn/shop/files/116_9f002ddd-90f3-4903-a6bf-01297403928f.jpg?v=1759172912&width=1920",
        "https://assetsio.gnwcdn.com/honkai-star-rail-birthday.jpg?width=1600&height=900&fit=crop&quality=100&format=png&enable=upscale&auto=webp"
    ];
    let bIdx = 0;
    setInterval(() => {
        bIdx = (bIdx + 1) % banners.length;
        document.getElementById("banner").src = banners[bIdx];
    }, 2500);

    const cakes = [
        {
            name: "Zhongli’s Ultimate Mora", 
            price: 1200, 
            img: "https://riverashbakery.com/cdn/shop/files/Genshin-Character-cake-2.jpg?v=1721742429Cake",
            size: "Large",
            flavor: "Caramel Mocha",
            tag: "Genshin Impact"
        },
        {
            name: "Luffy’s One Piece Cake", 
            price: 1500, 
            img: "https://scontent.fmnl17-6.fna.fbcdn.net/v/t39.30808-6/495966746_1110941877721505_7910090109009087496_n.jpg?stp=cp6_dst-jpg_tt6&_nc_cat=109&ccb=1-7&_nc_sid=7b2446&_nc_ohc=ZpxUszrwqBAQ7kNvwET_AWb&_nc_oc=Adpjm1KIfNNJOy30W6CS5DFrWzz2dDnGn3txRW42fnZshKHhVmeOq10vV0AqXogKapQ&_nc_zt=23&_nc_ht=scontent.fmnl17-6.fna&_nc_gid=3msBrO8K-uNrDI4woYmgxg&_nc_ss=7a389&oh=00_Af3CdKZNqW4J7aE6l595O0pGFO2u6pG7ZEX7Nz0lk1vLKA&oe=69DCE814",
            size: "Large",
            flavor: "Chocolate Mango",
            tag: "One Piece"
        },
        {
            name: "Super Naruto Cake", 
            price: 550, 
            img: "https://scontent.fmnl17-1.fna.fbcdn.net/v/t39.30808-6/630701693_25717828781201195_8171948013294379855_n.jpg?stp=cp6_dst-jpg_tt6&_nc_cat=101&ccb=1-7&_nc_sid=e06c5d&_nc_ohc=lODJQn5-lR0Q7kNvwGvjTat&_nc_oc=AdrMZoes8VoMo_xvpNAvrH5jftib4ShTVTJgR925Tl1zIR4RYIv-M8EFDXnpieHI1JU&_nc_zt=23&_nc_ht=scontent.fmnl17-1.fna&_nc_gid=3uf2JcMxBLTWtL-OXqqLWQ&_nc_ss=7a389&oh=00_Af2lKVitidA7KV_QHg5gxTwmaSuKjwmnUQTaf6-hO-0uJQ&oe=69DD01EB",
            size: "Medium",
            flavor: "Carrot",
            tag: "Naruto"
        }
    ];

    let cart = JSON.parse(localStorage.getItem("cart") || "[]");

    function render(){
        const container = document.getElementById("trend");
        container.innerHTML = "";
        cakes.forEach(c => {
            container.innerHTML += `
                <div class="cake-card">
                    <div class="img-box">
                        <img src="${c.img}" alt="${c.name}">
                    </div>
                    <div class="cake-info">
                        <span class="tag-pill">${c.tag}</span>
                        <h3 class="cake-name">${c.name}</h3>
                        <p class="cake-details">✨ ${c.flavor} • ${c.size} ✨</p>
                        <span class="cake-price">₱${c.price.toLocaleString()}</span>
                        <button class="add-btn" onclick="add('${c.name}', ${c.price})">ADD TO CART</button>
                    </div>
                </div>`;
        });
        updateCount();
    }

    function add(n, p) {
        cart.push({n, p});
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCount();
    }

    function updateCount() {
        document.getElementById("cart-count").innerText = cart.length;
    }

    function openAccount() { document.getElementById("account-modal").style.display = "flex"; }
    function closeAccount() { document.getElementById("account-modal").style.display = "none"; }

    render();
</script>

</body>
</html>
