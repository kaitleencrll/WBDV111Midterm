<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <style>
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #0b0e11;
        }
        .note {
            position: absolute; color: rgba(0, 242, 255, 0.4); 
            font-size: 38px; font-weight: bold;
            animation: float 6s linear infinite; bottom: -60px;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.9; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
        .sidebar-link { transition: 0.3s; }
        .sidebar-link:hover { background: rgba(0, 242, 255, 0.1) !important; padding-left: 60px !important; }
        
        .login-btn-wrapper { transition: 0.4s; }
        .login-btn-wrapper:hover { 
            background: #00f2ff !important; 
            box-shadow: 0 0 25px #00f2ff !important;
            transform: translateY(-3px);
        }
        .login-btn-wrapper:hover a { color: #0b0e11 !important; }

        .sub-btn-wrapper { transition: 0.4s; }
        .sub-btn-wrapper:hover { 
            background-color: white !important; 
            box-shadow: 0 0 30px #ff8c00 !important;
            transform: translateY(-5px);
        }

        .track-card {
            background: rgba(26, 29, 35, 0.8) !important;
            border: 2px solid rgba(0, 242, 255, 0.1);
            transition: 0.4s !important;
        }
        .track-card:hover {
            border-color: #00f2ff !important;
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }
        
        input:focus {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
            border-color: #00f2ff !important;
        }

        .playlist-img {
            transition: 0.4s;
            border: 2px solid transparent;
        }
        .playlist-img:hover {
            border-color: #ff8c00;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
        }

        /* ALBUM COVER PULSE */
        @keyframes cover-glow {
            0% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }
            50% { box-shadow: 0 0 25px rgba(0, 242, 255, 0.8); }
            100% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }
        }
        .album-pulse { animation: cover-glow 3s infinite; }
    </style>
</head>
<body style="margin: 0; font-family: 'Trebuchet MS', sans-serif; color: white; overflow-x: hidden; min-height: 100vh; padding-bottom: 150px;">

<div class="bg-animate" id="notes-container"></div>

<div class="sub-btn-wrapper" style="position: fixed; bottom: 25px; left: 25px; z-index: 9999; background-color: #ff8c00; padding: 12px 28px; border-radius: 10px; box-shadow: 0 0 20px #ff8c00;">
    <a href="subscription.html" style="text-decoration: none; color: #000; display: flex; align-items: center; gap: 12px;">
        <img src="music.png" width="35px" style="filter: brightness(0);">
        <span style="font-size: 24px; font-weight: bold; letter-spacing: 2px;">SUBSCRIPTION</span>
    </a>
</div>

<div class="login-btn-wrapper" style="position: absolute; top: 20px; right: 30px; z-index: 10; background: rgba(22, 27, 34, 0.9); padding: 10px 25px; border-radius: 8px; border: 2px solid #00f2ff; box-shadow: 0 0 10px #00f2ff;">
    <a href="login.html" style="text-decoration: none; color: #00f2ff; display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 20px; transition: 0.4s;">
        <img src="profile.png" width="30px"> LOG IN
    </a>
</div>

<div style="position: relative; width: 100%; border-bottom: 4px solid #00f2ff; box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);">
    <img src="banner.png" alt="Banner" style="width: 100%; height: auto; display: block;">
</div>

<div style="background: rgba(13, 17, 23, 0.95); border-right: 3px solid #00f2ff; border-radius: 0 30px 30px 0; margin-top: 40px; width: 400px; float: left; box-shadow: 10px 0 30px rgba(0,0,0,0.5); min-height: 300px;">
    <a href="index.html" class="sidebar-link" style="text-decoration: none; display: block; margin-top: 25px; padding: 20px 45px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 24px; letter-spacing: 5px;">
            <img src="house.png" width="45px" style="margin-right: 25px;"> H O M E
        </h2>
    </a>
    <a href="about.html" class="sidebar-link" style="text-decoration: none; display: block; padding: 20px 45px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 24px; letter-spacing: 5px;">
            <img src="line.png" width="45px" style="margin-right: 25px;"> A B O U T
        </h2>
    </a>
    <a href="gallery.html" class="sidebar-link" style="text-decoration: none; display: block; padding: 20px 45px; background: rgba(0, 242, 255, 0.05);">
        <h2 style="color: #00f2ff; display: flex; align-items: center; margin: 0; font-size: 24px; letter-spacing: 5px;">
            <img src="music.png" width="45px" style="margin-right: 25px;"> G A L L E R Y
        </h2>
    </a>
    <a href="contact.html" class="sidebar-link" style="text-decoration: none; display: block; padding: 20px 45px; padding-bottom: 45px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 24px; letter-spacing: 5px;">
            <img src="profile.png" width="45px" style="margin-right: 25px;"> C O N T A C T
        </h2>
    </a>
</div>

<div style="width: 68%; float: right; padding: 40px; box-sizing: border-box; margin-right: 2%;">
    <div style="background: rgba(26, 29, 35, 0.8); padding: 25px; border-radius: 20px; margin-bottom: 35px; border: 1px solid rgba(0,242,255,0.2); backdrop-filter: blur(10px);">
        <h2 style="color: #00f2ff; margin: 0 0 15px 0; letter-spacing: 3px; font-size: 22px;">EXPLORE</h2>
        <input type="text" id="searchInput" placeholder="Search Track..." style="width: 100%; padding: 15px; border-radius: 12px; border: 2px solid transparent; background: rgba(0,0,0,0.4); color: white; font-size: 16px; outline: none; border-bottom: 2px solid #00f2ff; transition: 0.3s;">
    </div>

    <h2 style="color: white; letter-spacing: 3px; border-left: 5px solid #00f2ff; padding-left: 15px; margin-bottom: 25px;">LIBRARY</h2>
    <div id="trackContainer" style="display: flex; gap: 25px; flex-wrap: wrap; margin-bottom: 50px;">
        <div onclick="playMusic('Fight Me Bite Me', 'Fight Me Bite Me.mp3', 'Fight.PNG')" style="width: 200px; cursor: pointer; text-align: center; padding: 20px; border-radius: 20px;" class="track-card">
            <img src="Fight.PNG" style="width: 100%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; border: 2px solid rgba(0,242,255,0.1);">
            <p style="color: white; font-weight: bold; margin-top: 15px; font-size: 16px;">Fight Me Bite Me</p>
        </div>
        <div onclick="playMusic('Therefore You and Me', 'Therefore You and Me.mp3', 'Therefore.PNG')" style="width: 200px; cursor: pointer; text-align: center; padding: 20px; border-radius: 20px;" class="track-card">
            <img src="Therefore.PNG" style="width: 100%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; border: 2px solid rgba(0,242,255,0.1);">
            <p style="color: white; font-weight: bold; margin-top: 15px; font-size: 16px;">Therefore You and Me</p>
        </div>
        <div onclick="playMusic('Home', 'Home.mp3', 'Home.png')" style="width: 200px; cursor: pointer; text-align: center; padding: 20px; border-radius: 20px;" class="track-card">
            <img src="Home.png" style="width: 100%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; border: 2px solid rgba(0,242,255,0.1);">
            <p style="color: white; font-weight: bold; margin-top: 15px; font-size: 16px;">Home</p>
        </div>
    </div>

    <h2 style="color: white; letter-spacing: 3px; border-left: 5px solid #ff8c00; padding-left: 15px; margin-bottom: 25px;">PLAYLISTS</h2>
    <div style="display: flex; gap: 30px; margin-bottom: 50px;">
        <img src="Playlist1.png" class="playlist-img" style="width: 180px; height: 180px; border-radius: 20px; object-fit: cover;">
        <img src="Playlist2.png" class="playlist-img" style="width: 180px; height: 180px; border-radius: 20px; object-fit: cover;">
        <img src="Playlist3.png" class="playlist-img" style="width: 180px; height: 180px; border-radius: 20px; object-fit: cover;">
    </div>

    <div style="background: rgba(26, 29, 35, 0.8); padding: 30px; border-radius: 25px; color: #00f2ff; text-align: center; border: 2px dashed rgba(0,242,255,0.4); backdrop-filter: blur(10px);">
        <h3 style="margin: 0; letter-spacing: 4px; font-size: 20px;">PERSONAL STATS</h3>
        <p style="color: white; font-size: 16px; margin: 15px 0 0 0;">
            Tracks Played: <span id="statCount" style="font-weight: bold; color: #ff8c00; font-size: 20px;">0</span> | 
            Added to Playlist: <span style="font-weight: bold; color: #ff8c00; font-size: 20px;">3</span> | 
            Mood: <span style="color:#00f2ff;">Chill</span>
        </p>
    </div>
</div>

<!-- ENLARGED NOW PLAYING BAR -->
<div id="playerBar" style="position: fixed; bottom: 0; left: 0; width: 100%; height: 130px; background: rgba(13, 17, 23, 0.98); border-top: 5px solid #00f2ff; display: flex; align-items: center; padding: 0 60px; box-sizing: border-box; z-index: 10000; visibility: hidden; backdrop-filter: blur(20px); box-shadow: 0 -15px 40px rgba(0,0,0,0.6);">
    <img id="playerImg" src="" class="album-pulse" style="width: 100px; height: 100px; border-radius: 15px; margin-right: 35px; border: 3px solid #00f2ff; object-fit: cover;">
    <div style="flex: 1;">
        <p id="playerTitle" style="color: white; margin: 0; font-weight: bold; font-size: 26px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,242,255,0.4);">Song Title</p>
        <p style="color: #00f2ff; margin: 8px 0 0 0; font-size: 16px; letter-spacing: 2px; font-weight: bold; opacity: 0.8;">NOW PLAYING • VIBESTREAM PRO</p>
    </div>
    <audio id="mainAudio" controls style="filter: invert(1) hue-rotate(180deg) brightness(1.5) contrast(1.2); height: 50px; width: 450px;"></audio>
</div>

<script>
    let tracksPlayed = 0;
    const container = document.getElementById('notes-container');
    const noteIcons = ['♪', '♫', '♬', '♩'];
    for(let i=0; i<35; i++) {
        let n = document.createElement('div');
        n.className = 'note';
        n.innerText = noteIcons[Math.floor(Math.random() * noteIcons.length)];
        n.style.left = Math.random() * 100 + "vw";
        n.style.animationDelay = Math.random() * 6 + "s";
        container.appendChild(n);
    }

    function playMusic(title, file, img) {
        const playerBar = document.getElementById('playerBar');
        const audio = document.getElementById('mainAudio');
        const statDisplay = document.getElementById('statCount');
        playerBar.style.visibility = 'visible';
        document.getElementById('playerTitle').innerText = title;
        document.getElementById('playerImg').src = img;
        audio.src = file;
        audio.play();
        tracksPlayed++;
        statDisplay.innerText = tracksPlayed;
    }

    document.getElementById('searchInput').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const cards = document.getElementsByClassName('track-card');
        Array.from(cards).forEach(card => {
            const title = card.innerText.toLowerCase();
            card.style.display = title.includes(term) ? 'block' : 'none';
        });
    });
</script>

</body>
</html>
