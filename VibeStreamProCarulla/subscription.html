<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subscription</title>
    <style>
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #0b0e11;
        }
        .note {
            position: absolute; color: rgba(0, 242, 255, 0.4); 
            font-size: 38px; font-weight: bold;
            animation: float 6s linear infinite; bottom: -60px;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.9; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
        .plan-card {
            background-color: rgba(26, 29, 35, 0.85); 
            border: 2px solid rgba(0, 242, 255, 0.3); 
            border-radius: 30px; 
            width: 280px; 
            padding: 40px 25px; 
            text-align: center; 
            height: 350px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            transition: 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .plan-card:hover {
            transform: translateY(-10px);
            border-color: #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        .premium-card {
            background-color: rgba(22, 27, 34, 0.9);
            border: 4px solid #ff8c00;
            width: 320px;
            height: 420px;
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.3);
            z-index: 2;
        }
        .premium-card:hover {
            border-color: #00f2ff;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.4);
        }
        .btn-outline {
            width: 100%; padding: 12px; border-radius: 25px; 
            border: 2px solid #00f2ff; background: transparent; 
            color: #00f2ff; font-weight: bold; cursor: pointer; 
            transition: 0.3s;
        }
        .btn-outline:hover { background: #00f2ff; color: black; box-shadow: 0 0 15px #00f2ff; }
        
        .btn-solid {
            width: 100%; padding: 15px; border-radius: 30px; 
            border: none; background: #ff8c00; color: black; 
            font-weight: bold; font-size: 18px; cursor: pointer; 
            transition: 0.3s;
        }
        .btn-solid:hover { background: #00f2ff; box-shadow: 0 0 25px #00f2ff; transform: scale(1.05); }

        .back-link {
            margin-top: 40px; color: #ff8c00; text-decoration: none; 
            font-size: 18px; transition: 0.3s;
        }
        .back-link:hover { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body style="margin: 0; font-family: 'Trebuchet MS'; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; box-sizing: border-box; border: 5px solid #001f3f;">

    <div class="bg-animate" id="notes-container"></div>

    <h1 style="letter-spacing: 8px; margin: 0 0 10px 0; font-size: 48px;">
        <span style="color: #00f2ff; text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);">PICK YOUR</span> 
        <span style="color: #ff8c00; text-shadow: 0 0 15px rgba(255, 140, 0, 0.5);">BEAT</span>
    </h1>
    <p style="color: #bdc3c7; margin: 0 0 40px 0; font-size: 20px; letter-spacing: 1px;">Choose the plan that fits your rhythm.</p>

    <div style="display: flex; gap: 30px; align-items: center;">
        
        <div class="plan-card">
            <div>
                <h3 style="margin: 0; font-size: 24px; color: white;">BASIC</h3>
                <div style="font-size: 42px; font-weight: bold; margin: 20px 0; color: #00f2ff;">FREE</div>
                <p style="font-size: 16px; color: #bdc3c7; line-height: 1.8;">Standard Audio<br>Ads Included<br>Online Only</p>
            </div>
            <button class="btn-outline">CURRENT</button>
        </div>

        <div class="plan-card premium-card">
            <div>
                <div style="background: #ff8c00; color: black; font-size: 12px; font-weight: bold; padding: 6px 15px; border-radius: 15px; display: inline-block; margin-bottom: 20px;">MOST POPULAR</div>
                <h3 style="margin: 0; font-size: 30px; color: white;">PREMIUM</h3>
                <div style="font-size: 58px; font-weight: bold; margin: 15px 0; color: #ff8c00;">$9.99</div>
                <p style="font-size: 18px; font-weight: bold; line-height: 1.8; color: white;">Hi-Fi Audio • No Ads<br>Offline Downloads<br>Unlimited Skips</p>
            </div>
            <button class="btn-solid">SELECT PLAN</button>
        </div>

        <div class="plan-card">
            <div>
                <h3 style="margin: 0; font-size: 24px; color: white;">FAMILY</h3>
                <div style="font-size: 42px; font-weight: bold; margin: 20px 0; color: #00f2ff;">$14.99</div>
                <p style="font-size: 16px; color: #bdc3c7; line-height: 1.8;">Up to 6 Accounts<br>Parental Controls<br>All Features</p>
            </div>
            <button class="btn-outline">SELECT PLAN</button>
        </div>

    </div>

    <a href="index.html" class="back-link">← Back to Home</a>

    <script>
        const container = document.getElementById('notes-container');
        const noteIcons = ['♪', '♫', '♬', '♩'];
        for(let i=0; i<35; i++) {
            let n = document.createElement('div');
            n.className = 'note';
            n.innerText = noteIcons[Math.floor(Math.random() * noteIcons.length)];
            n.style.left = Math.random() * 100 + "vw";
            n.style.animationDelay = Math.random() * 6 + "s";
            container.appendChild(n);
        }
    </script>
</body>
</html>
