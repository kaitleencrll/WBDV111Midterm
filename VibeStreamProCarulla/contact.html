<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <style>
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #0b0e11;
        }
        .note {
            position: absolute; color: rgba(0, 242, 255, 0.4); 
            font-size: 38px; font-weight: bold;
            animation: float 6s linear infinite; bottom: -60px;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.9; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
        .sidebar-link { transition: 0.3s; }
        .sidebar-link:hover { background: rgba(0, 242, 255, 0.1) !important; padding-left: 60px !important; }
        
        .login-btn-wrapper { transition: 0.4s; }
        .login-btn-wrapper:hover { 
            background: #00f2ff !important; 
            box-shadow: 0 0 25px #00f2ff !important;
            transform: translateY(-3px);
        }
        .login-btn-wrapper:hover a { color: #0b0e11 !important; }

        .sub-btn-wrapper { transition: 0.4s; }
        .sub-btn-wrapper:hover { 
            background-color: white !important; 
            box-shadow: 0 0 30px #ff8c00 !important;
            transform: translateY(-5px);
        }
        .contact-card:hover {
            border-color: #00f2ff !important;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2) !important;
        }
        input:focus, select:focus, textarea:focus {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
            border: 1px solid #00f2ff !important;
            transform: scale(1.02);
        }
        .send-btn { transition: 0.4s; }
        .send-btn:hover {
            background-color: #ff8c00 !important;
            box-shadow: 0 0 25px #ff8c00;
            transform: scale(1.1);
        }
    </style>
</head>
<body style="margin: 0; font-family: 'Trebuchet MS', sans-serif; color: white; overflow-x: hidden; min-height: 100vh;">

<div class="bg-animate" id="notes-container"></div>

<div class="sub-btn-wrapper" style="position: fixed; bottom: 25px; left: 25px; z-index: 9999; background-color: #ff8c00; padding: 12px 28px; border-radius: 10px; box-shadow: 0 0 20px #ff8c00;">
    <a href="subscription.html" style="text-decoration: none; color: #000; display: flex; align-items: center; gap: 12px;">
        <img src="music.png" width="35px" style="filter: brightness(0);">
        <span style="font-size: 24px; font-weight: bold; letter-spacing: 2px;">SUBSCRIPTION</span>
    </a>
</div>

<div class="login-btn-wrapper" style="position: absolute; top: 20px; right: 30px; z-index: 10; background: rgba(22, 27, 34, 0.9); padding: 10px 25px; border-radius: 8px; border: 2px solid #00f2ff; box-shadow: 0 0 10px #00f2ff;">
    <a href="login.html" style="text-decoration: none; color: #00f2ff; display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 20px; transition: 0.4s;">
        <img src="profile.png" width="30px"> LOG IN
    </a>
</div>

<div style="position: relative; width: 100%; border-bottom: 4px solid #00f2ff; box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);">
    <img src="banner.png" alt="Banner" style="width: 100%; height: auto; display: block;">
</div>

<div style="background: rgba(13, 17, 23, 0.95); border-right: 3px solid #00f2ff; border-radius: 0 30px 30px 0; margin-top: 40px; width: 400px; float: left; box-shadow: 10px 0 30px rgba(0,0,0,0.5);">
    <a href="index.html" class="sidebar-link" style="text-decoration: none; display: block; margin-top: 25px; padding: 20px 45px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 24px; letter-spacing: 5px;">
            <img src="house.png" width="45px" style="margin-right: 25px;"> H O M E
        </h2>
    </a>
    <a href="about.html" class="sidebar-link" style="text-decoration: none; display: block; padding: 20px 45px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 24px; letter-spacing: 5px;">
            <img src="line.png" width="45px" style="margin-right: 25px;"> A B O U T
        </h2>
    </a>
    <a href="gallery.html" class="sidebar-link" style="text-decoration: none; display: block; padding: 20px 45px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 24px; letter-spacing: 5px;">
            <img src="music.png" width="45px" style="margin-right: 25px;"> G A L L E R Y
        </h2>
    </a>
    <a href="contact.html" class="sidebar-link" style="text-decoration: none; display: block; padding: 20px 45px; padding-bottom: 45px; background: rgba(0, 242, 255, 0.05);">
        <h2 style="color: #00f2ff; display: flex; align-items: center; margin: 0; font-size: 24px; letter-spacing: 5px;">
            <img src="profile.png" width="45px" style="margin-right: 25px;"> C O N T A C T
        </h2>
    </a>
</div>

<div class="contact-card" style="margin-top: 40px; margin-bottom: 80px; margin-right: 3%; width: 68%; float: right; background-color: rgba(26, 29, 35, 0.85); border-radius: 40px; border: 4px solid #ff8c00; padding: 40px; box-shadow: 0 0 30px rgba(255, 140, 0, 0.3); backdrop-filter: blur(10px); box-sizing: border-box; text-align: center; color: white; transition: 0.4s;">
    
    <h2 style="color: white; font-size: 32px; letter-spacing: 8px; margin: 0; border-bottom: 3px solid #00f2ff; display: inline-block; padding-bottom: 10px;">
        <span style="color: #00f2ff; text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);">GET IN</span> 
        <span style="color: #ff8c00; text-shadow: 0 0 15px rgba(255, 140, 0, 0.5);">TOUCH</span>
    </h2>
    
    <p style="color: #bdc3c7; text-align: center; margin: 25px 0 30px 0; font-size: 18px; letter-spacing: 1px;">Have questions or want to collaborate with the Beat?</p>

    <form style="display: flex; flex-direction: column; gap: 20px; max-width: 700px; margin: 0 auto;">
        
        <div style="display: flex; gap: 20px;">
            <input type="text" placeholder="Your Name" style="flex: 1; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); outline: none; background: rgba(0,0,0,0.3); color: white; transition: 0.3s; font-size: 16px;">
            <input type="email" placeholder="Your Email" style="flex: 1; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); outline: none; background: rgba(0,0,0,0.3); color: white; transition: 0.3s; font-size: 16px;">
        </div>
        
        <select style="padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); outline: none; background: rgba(0,0,0,0.3); color: white; cursor: pointer; transition: 0.3s; font-size: 16px;">
            <option>General Inquiry</option>
            <option>Artist Submission</option>
            <option>Subscription Help</option>
            <option>Business/Ads</option>
        </select>
        
        <textarea placeholder="Your Message..." rows="4" style="padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); outline: none; background: rgba(0,0,0,0.3); color: white; resize: none; transition: 0.3s; font-size: 16px;"></textarea>
        
        <button type="submit" class="send-btn" style="background-color: #00f2ff; color: #0b0e11; border: none; padding: 15px; border-radius: 40px; font-weight: bold; font-size: 18px; cursor: pointer; letter-spacing: 3px; width: 260px; align-self: center; margin-top: 10px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);">SEND MESSAGE</button>
    </form>
</div>

<script>
    const container = document.getElementById('notes-container');
    const noteIcons = ['♪', '♫', '♬', '♩'];
    for(let i=0; i<35; i++) {
        let n = document.createElement('div');
        n.className = 'note';
        n.innerText = noteIcons[Math.floor(Math.random() * noteIcons.length)];
        n.style.left = Math.random() * 100 + "vw";
        n.style.animationDelay = Math.random() * 6 + "s";
        container.appendChild(n);
    }
</script>

</body>
</html>
