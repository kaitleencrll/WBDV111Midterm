<!DOCTYPE html>
<html lang="en">
<head>
    <title>Staff</title>
</head>
<body style="background-color: #0a192f; margin: 0; font-family: 'Segoe UI', sans-serif; color: white;">


<div style="position: absolute; top: 15px; right: 25px; z-index: 10; background-color: rgba(17, 34, 64, 0.9); padding: 8px 15px; border-radius: 4px; border: 1px solid #64ffda;">
    <a href="login.html" style="text-decoration: none; color: #64ffda; display: flex; align-items: center; gap: 10px;">
        <img src="Profile.png" width="25px" style="display: block;">
        <span style="font-size: 14px; font-weight: bold; letter-spacing: 1px;">LOG IN</span>
    </a>
</div>


<div style="position: relative; width: 100%; overflow: hidden; border-bottom: 4px solid #64ffda;">
    <img src="banner.PNG" style="width: 100%; height: auto; display: block; max-height: 300px; object-fit: cover;">
</div>


<nav style="background-color: #112240; display: flex; justify-content: center; gap: 50px; padding: 15px 0; border-bottom: 1px solid #233554; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
    <a href="index.html" style="text-decoration: none; color: #64ffda; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <img src="Staff.png" width="30px">
        <span style="font-size: 12px; font-weight: bold; letter-spacing: 1px;">STAFF</span>
    </a>
    <a href="timesheets.html" style="text-decoration: none; color: #ccd6f6; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <img src="Time.png" width="30px">
        <span style="font-size: 12px; font-weight: bold; letter-spacing: 1px;">TIMESHEETS</span>
    </a>
    <a href="payslips.html" style="text-decoration: none; color: #ccd6f6; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <img src="Payslip.png" width="30px">
        <span style="font-size: 12px; font-weight: bold; letter-spacing: 1px;">PAYSLIPS</span>
    </a>
</nav>


<div style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="color: #ccd6f6; letter-spacing: 3px; font-weight: 300;">EMPLOYEE OVERVIEW</h1>
        <div style="width: 60px; height: 3px; background-color: #64ffda; margin: 10px auto;"></div>
    </div>

  
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px;">
        
    
        <div style="background-color: #112240; border-radius: 8px; padding: 20px; text-align: center; border: 1px solid #233554;">
            <img src="Albedo.JPG" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid #64ffda; object-fit: cover; margin-bottom: 15px;">
            <h3 style="margin: 5px 0; color: #64ffda;">Albedo</h3>
            <p style="font-size: 13px; color: #8892b0; margin-bottom: 15px;">Manager</p>
            <div style="background: #0a192f; padding: 10px; border-radius: 4px; font-size: 14px;">
                Weekly Hours: <strong>28</strong>
            </div>
        </div>

       
        <div style="background-color: #112240; border-radius: 8px; padding: 20px; text-align: center; border: 2px solid #64ffda; position: relative;">
            <div style="position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #64ffda; color: #0a192f; padding: 2px 10px; font-size: 10px; font-weight: bold; border-radius: 10px;">TOP PERFORMER</div>
            <img src="Kaveh.JPG" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid #64ffda; object-fit: cover; margin-bottom: 15px;">
            <h3 style="margin: 5px 0; color: #64ffda;">Kaveh</h3>
            <p style="font-size: 13px; color: #8892b0; margin-bottom: 15px;">Architect</p>
            <div style="background: #0a192f; padding: 10px; border-radius: 4px; font-size: 14px;">
                Weekly Hours: <strong>56</strong>
            </div>
        </div>

      
        <div style="background-color: #112240; border-radius: 8px; padding: 20px; text-align: center; border: 1px solid #233554;">
            <img src="Tartaglia.JPG" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid #f44336; object-fit: cover; margin-bottom: 15px;">
            <h3 style="margin: 5px 0; color: #ccd6f6;">Tartaglia</h3>
            <p style="font-size: 13px; color: #f44336; font-weight: bold; margin-bottom: 15px;">Warning: Absenteeism</p>
            <div style="background: #0a192f; padding: 10px; border-radius: 4px; font-size: 14px;">
                Weekly Hours: <strong>0.1</strong>
            </div>
        </div>

      
        <div style="background-color: #112240; border-radius: 8px; padding: 20px; text-align: center; border: 1px solid #233554;">
            <img src="Venti.JPG" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid #f44336; object-fit: cover; margin-bottom: 15px;">
            <h3 style="margin: 5px 0; color: #ccd6f6;">Venti</h3>
            <p style="font-size: 13px; color: #f44336; font-weight: bold; margin-bottom: 15px;">Warning: Absenteeism</p>
            <div style="background: #0a192f; padding: 10px; border-radius: 4px; font-size: 14px;">
                Weekly Hours: <strong>0</strong>
            </div>
        </div>

    </div>
</div>

</body>
</html>
