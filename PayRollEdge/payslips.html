<!DOCTYPE html>
<html lang="en">
<head>
    <title>Payslips</title>
</head>
<body style="background-color: #0a192f; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden;">


<div style="position: absolute; top: 15px; right: 25px; z-index: 10; background-color: rgba(17, 34, 64, 0.9); padding: 8px 15px; border-radius: 4px; border: 1px solid #64ffda;">
    <a href="login.html" style="text-decoration: none; color: #64ffda; display: flex; align-items: center; gap: 10px;">
        <img src="Profile.png" width="25px" style="display: block;">
        <span style="font-size: 14px; font-weight: bold; letter-spacing: 1px;">LOG IN</span>
    </a>
</div>


<div style="position: relative; width: 100%; overflow: hidden; border-bottom: 4px solid #64ffda;">
    <img src="banner.PNG" style="width: 100%; height: auto; display: block; max-height: 300px; object-fit: cover;">
</div>


<nav style="background-color: #112240; display: flex; justify-content: center; gap: 50px; padding: 15px 0; border-bottom: 1px solid #233554; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
    <a href="index.html" style="text-decoration: none; color: #ccd6f6; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <img src="Staff.png" width="30px">
        <span style="font-size: 12px; font-weight: bold; letter-spacing: 1px;">STAFF</span>
    </a>
    <a href="timesheets.html" style="text-decoration: none; color: #ccd6f6; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <img src="Time.png" width="30px">
        <span style="font-size: 12px; font-weight: bold; letter-spacing: 1px;">TIMESHEETS</span>
    </a>
    <a href="payslips.html" style="text-decoration: none; color: #64ffda; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <img src="Payslip.png" width="30px">
        <span style="font-size: 12px; font-weight: bold; letter-spacing: 1px;">PAYSLIPS</span>
    </a>
</nav>


<div style="max-width: 900px; margin: 30px auto; padding: 0 20px;">
    
    <div style="display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: auto auto; gap: 15px;">
        
        
        <div style="background-color: #112240; border: 1px solid #233554; border-radius: 12px; padding: 25px; display: flex; flex-direction: column; justify-content: center;">
            <span style="color: #8892b0; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Next Payday</span>
            <h1 style="color: #64ffda; margin: 10px 0; font-size: 32px;">Thursday, Mar 12</h1>
            <div style="height: 4px; width: 40px; background: #64ffda;"></div>
        </div>

        
        <div style="background-color: #112240; border: 1px solid #233554; border-radius: 12px; padding: 25px; text-align: center;">
            <span style="color: #8892b0; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Total Hours</span>
            <h2 style="color: #ccd6f6; margin: 10px 0; font-size: 28px;">28.0</h2>
            <p style="font-size: 10px; margin: 0; color: #64ffda;">Verified</p>
        </div>

       
        <div style="background-color: #112240; border: 1px solid #233554; border-radius: 12px; padding: 25px; grid-column: 1 / 3;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="color: #8892b0; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Tax View</span>
                <button style="background: transparent; border: 1px solid #64ffda; color: #64ffda; padding: 4px 10px; border-radius: 4px; font-size: 10px; cursor: pointer;">Detailed Breakdown</button>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <p style="margin: 0; font-size: 14px; color: #ccd6f6;">Income Tax (15%)</p>
                    <p style="margin: 0; font-size: 14px; color: #ccd6f6;">Social Security</p>
                    <p style="margin: 8px 0 0 0; font-size: 18px; color: #64ffda; font-weight: bold;">Total Deductions</p>
                </div>
                <div style="text-align: right;">
                    <p style="margin: 0; font-size: 14px; color: #f44336;">-P1430.50</p>
                    <p style="margin: 0; font-size: 14px; color: #f44336;">-P500.00</p>
                    <p style="margin: 8px 0 0 0; font-size: 18px; color: #f44336; font-weight: bold;">$1930.50</p>
                </div>
            </div>
        </div>
    </div>

    
    <div style="margin-top: 25px; text-align: center;">
        <form action="staff.html">
            <button type="submit" style="background-color: #64ffda; color: #0a192f; border: none; padding: 15px 40px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s;">
                Export Data & Return to Staff
            </button>
        </form>
    </div>

</div>

</body>
</html>
