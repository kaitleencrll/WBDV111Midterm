<!DOCTYPE html>
<html lang="en">
<head>

<body style="background-color: #0a192f; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden;">

</div>


<div style="position: relative; width: 100%; overflow: hidden; border-bottom: 4px solid #64ffda;">

</div>


<nav style="background-color: #112240; display: flex; justify-content: center; gap: 50px; padding: 15px 0; border-bottom: 1px solid #233554; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">

    <a href="timesheets.html" style="text-decoration: none; color: #64ffda; display: flex; flex-direction: column; align-items: center; gap: 5px;">

<div style="max-width: 850px; margin: 10px auto; padding: 0 20px;">
    
    <div style="text-align: center; margin-bottom: 10px;">
        <h2 style="color: #ccd6f6; letter-spacing: 2px; font-weight: 300; margin: 5px 0;">WEEKLY TIMESHEET</h2>

    <div style="background-color: #112240; border: 1px solid #233554; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">

            <thead>
                <tr style="background-color: #233554; color: #64ffda; text-transform: uppercase;">
                    <th style="padding: 8px 15px;">Day</th>
                    <th style="padding: 8px 15px;">Hours</th>
                    <th style="padding: 8px 15px;">Task</th>

                <tr style="border-bottom: 1px solid #233554;">

                    <td style="padding: 6px 15px;"><input type="number" value="8" style="width: 45px; background: #0a192f; border: 1px solid #233554; color: #64ffda; padding: 4px; border-radius: 4px;"></td>
                    <td style="padding: 6px 15px;"><input type="text" placeholder="Audit" style="width: 90%; background: #0a192f; border: 1px solid #233554; color: white; padding: 4px; border-radius: 4px;"></td>
                </tr>
                <tr style="border-bottom: 1px solid #233554;">
                    <td style="padding: 6px 15px;">Tue</td>

                    <td style="padding: 6px 15px;"><input type="text" placeholder="Management" style="width: 90%; background: #0a192f; border: 1px solid #233554; color: white; padding: 4px; border-radius: 4px;"></td>
                </tr>
                <tr style="border-bottom: 1px solid #233554;">
                    <td style="padding: 6px 15px;">Wed</td>
                    <td style="padding: 6px 15px;"><input type="number" value="8" style="width: 45px; background: #0a192f; border: 1px solid #233554; color: #64ffda; padding: 4px; border-radius: 4px;"></td>
                    <td style="padding: 6px 15px;"><input type="text" placeholder="Meeting" style="width: 90%; background: #0a192f; border: 1px solid #233554; color: white; padding: 4px; border-radius: 4px;"></td>
                </tr>
                <tr style="border-bottom: 1px solid #233554;">
                    <td style="padding: 6px 15px;">Thu</td>
                    <td style="padding: 6px 15px;"><input type="number" value="4" style="width: 45px; background: #0a192f; border: 1px solid #233554; color: #64ffda; padding: 4px; border-radius: 4px;"></td>
                    <td style="padding: 6px 15px;"><input type="text" placeholder="Planning" style="width: 90%; background: #0a192f; border: 1px solid #233554; color: white; padding: 4px; border-radius: 4px;"></td>
                </tr>
                <tr style="border-bottom: 1px solid #233554;">
                    <td style="padding: 6px 15px;">Fri</td>

                    <td style="padding: 6px 15px;"><input type="text" placeholder="Leave" style="width: 90%; background: #0a192f; border: 1px solid #233554; color: white; padding: 4px; border-radius: 4px;"></td>
                </tr>
            </tbody>
        </table>
        
      
        <div style="padding: 10px 20px; background-color: #233554; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 14px; font-weight: bold;">TOTAL: <span style="color: #64ffda;">28h</span></div>
            <form action="payslips.html">
                <button type="submit" style="background-color: #64ffda; color: #0a192f; border: none; padding: 6px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase;">Submit Log</button>
            </form>
        </div>
    </div>
    
    <p style="text-align: center; font-size: 11px; color: #8892b0; margin-top: 8px;">Deadline: Thursday 5:00 PM</p>
</div>
