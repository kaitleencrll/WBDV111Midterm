<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
</head>
<body style="background-color: #0a192f; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white;">

<div style="background-color: #112240; border: 1px solid #233554; width: 400px; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    

    <img src="logo.png" alt="PayRoll Edge" style="width: 220px; height: auto; margin-bottom: 10px;">
    
    <h2 style="margin: 0 0 30px 0; color: #ccd6f6; font-weight: 300; letter-spacing: 1px;">Corporate Access</h2>
    
   
    <form action="index.html" method="GET" style="width: 85%; display: flex; flex-direction: column; gap: 20px;">
        
        
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 12px; color: #64ffda; margin-left: 5px;">FULL NAME</label>
            <input type="text" placeholder="e.g. Albedo" required style="padding: 12px; border-radius: 4px; border: 1px solid #233554; background-color: #0a192f; color: white; outline: none;">
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 12px; color: #64ffda; margin-left: 5px;">STAFF NUMBER</label>
            <input type="text" placeholder="e.g. PE-12345" required style="padding: 12px; border-radius: 4px; border: 1px solid #233554; background-color: #0a192f; color: white; outline: none;">
        </div>

       
        <div style="display: flex; justify-content: space-around; align-items: center; padding: 15px 0; border-top: 1px solid #233554; border-bottom: 1px solid #233554; margin: 10px 0; background-color: rgba(10, 25, 47, 0.5); border-radius: 8px;">
            <div style="text-align: center; cursor: pointer;" onclick="alert('Scanning Fingerprint...')">
                <img src="Fingerprint.png" alt="Fingerprint" style="width: 45px; height: 45px; margin-bottom: 5px; opacity: 0.8;">
                <div style="color: #64ffda; font-size: 10px; font-weight: bold; text-transform: uppercase;">Touch ID</div>
            </div>

            <div style="text-align: center; cursor: pointer;" onclick="alert('Scanning Face ID...')">
                <img src="FaceId.png" alt="FaceID" style="width: 45px; height: 45px; margin-bottom: 5px; opacity: 0.8;">
                <div style="color: #64ffda; font-size: 10px; font-weight: bold; text-transform: uppercase;">Face ID</div>
            </div>
        </div>
        
       
        <button type="submit" style="width: 100%; padding: 14px; border-radius: 4px; border: none; background-color: #64ffda; color: #0a192f; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s;">
            Secure Login
        </button>
        
        <div style="text-align: center; font-size: 13px;">
            <a href="#" style="color: #8892b0; text-decoration: none;">Difficulty logging in? <span style="color: #64ffda;">Contact IT Support</span></a>
        </div>
    </form>
</div>

</body>
</html>
