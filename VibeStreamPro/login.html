<!DOCTYPE html>
<html>
<head>
    <title>Log In</title>
</head>
<body style="background-color: slategrey; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Trebuchet MS';">

<div style="background-color: #36454F; border: 1px solid white; width: 350px; padding: 40px 0; display: flex; flex-direction: column; align-items: center; border-radius: 20px;">
    <img src="logo.png" style="width: 200px; height: auto;">
    
    <h3 style="margin: -10px 0 30px 0; color: white;">Log in to the Beat!</h3>
    
    <form action="home.html" style="width: 80%; display: flex; flex-direction: column; gap: 15px;">
        <input type="email" placeholder="Email" required style="padding: 10px; border-radius: 5px; border: none; outline: none;">
        <input type="password" placeholder="Password" required style="padding: 10px; border-radius: 5px; border: none; outline: none;">
        
        <button type="submit" style="width: 150px; align-self: center; padding: 10px; border-radius: 20px; border: none; background-color: white; color: #36454F; font-weight: bold; cursor: pointer;">Sign In</button>
        
        <div style="text-align: center; font-size: 14px;">
            <a href="#" style="color: white; text-decoration: none; display: block; margin-bottom: 10px;">Forgot Password?</a>
            <span style="color: lightgrey;">New here? <a href="register.html" style="color: white; font-weight: bold; text-decoration: none;">Join the Beat</a></span>
        </div>
    </form>
</div>

</body>
</html>
