<body style="background-color: #36454F; margin: 0; font-family: 'Trebuchet MS', sans-serif; overflow-x: hidden;">


<div style="position: fixed; bottom: 20px; left: 25px; z-index: 9999; background-color: #5ab9d1; padding: 10px 20px; border-radius: 8px; border: 1px solid white;">
    <a href="subscription.html" style="text-decoration: none; color: white; display: flex; align-items: center; gap: 12px;">
        <img src="music.PNG" width="35px" style="display: block; filter: brightness(0) invert(1);">
        <span style="font-size: 24px; font-weight: bold; letter-spacing: 2px;">SUBSCRIPTION</span>
    </a>
</div>


<div style="position: absolute; top: 15px; right: 25px; z-index: 10; background-color: Gray; padding: 10px 20px; border-radius: 8px; border: 1px solid white;">

        <img src="profile.png" width="35px" style="display: block;">
        <span style="font-size: 24px; font-weight: bold; letter-spacing: 2px;">LOG IN</span>
    </a>
</div>


<div style="position: relative; width: 100%; overflow: hidden; border-bottom: 2px solid #5ab9d1;">
    <img src="banner.PNG" style="width: 100%; height: auto; display: block;">
</div>


<div style="background-color: #2c3e50; border: 1px solid rgba(255,255,255,0.2); border-radius: 0 20px 20px 0; margin-top: 20px; width: 15%; height: auto; padding-bottom: 30px; float: left; box-shadow: 4px 0 15px rgba(0,0,0,0.3);">
    <a href="home.html" style="text-decoration: none; display: block; margin-top: 25px; padding: 10px 15px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 18px; letter-spacing: 2px;">
            <img src="house.png" width="45px" style="margin-right: 15px;"> H O M E
        </h2>
    </a>
    <a href="about.html" style="text-decoration: none; display: block; margin-top: 15px; padding: 10px 15px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 18px; letter-spacing: 2px;">
            <img src="line.png" width="45px" style="margin-right: 15px;"> A B O U T
        </h2>
    </a>
    <a href="gallery.html" style="text-decoration: none; display: block; margin-top: 15px; padding: 10px 15px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 18px; letter-spacing: 2px;">
            <img src="music.PNG" width="45px" style="margin-right: 15px;"> G A L L E R Y
        </h2>
    </a>
    <a href="contact.html" style="text-decoration: none; display: block; margin-top: 15px; padding: 10px 15px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 18px; letter-spacing: 2px;">
            <img src="profile.png" width="45px" style="margin-right: 15px;"> C O N T A C T
        </h2>
    </a>
</div>


<div style="margin-top: 20px; margin-right: 2%; width: 80%; float: right; background-color: #2c3e50; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); padding: 20px 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); box-sizing: border-box;">
    
    <h2 style="color: white; letter-spacing: 5px; text-align: center; border-bottom: 2px solid #5ab9d1; padding-bottom: 8px; margin: 0;">GET IN TOUCH</h2>
    
    <p style="color: lightgrey; text-align: center; margin: 10px 0 15px 0; font-size: 14px;">Have questions or want to collaborate with the Beat?</p>

    <form style="display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto;">
        
       
        <div style="display: flex; gap: 12px;">
            <input type="text" placeholder="Your Name" style="flex: 1; padding: 12px; border-radius: 10px; border: none; outline: none; background: #36454F; color: white;">
            <input type="email" placeholder="Your Email" style="flex: 1; padding: 12px; border-radius: 10px; border: none; outline: none; background: #36454F; color: white;">
        </div>
        
        <select style="padding: 12px; border-radius: 10px; border: none; outline: none; background: #36454F; color: white; cursor: pointer;">
            <option>General Inquiry</option>
            <option>Artist Submission</option>
            <option>Subscription Help</option>
            <option>Business/Ads</option>
        </select>
        
      
        <textarea placeholder="Your Message..." rows="3" style="padding: 12px; border-radius: 10px; border: none; outline: none; background: #36454F; color: white; resize: none;"></textarea>
        
        <button type="submit" style="background-color: #5ab9d1; color: white; border: none; padding: 12px; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; letter-spacing: 2px; width: 220px; align-self: center; margin-top: 5px;">SEND MESSAGE</button>
    </form>
