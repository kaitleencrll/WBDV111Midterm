<body style="background-color: #36454F; margin: 0; font-family: 'Trebuchet MS', sans-serif; padding-bottom: 120px; overflow-x: hidden;">

    <a href="subscription.html" style="text-decoration: none; color: white; display: flex; align-items: center; gap: 12px;">
        <img src="music.PNG" width="35px" style="display: block; filter: brightness(0) invert(1);">
        <span style="font-size: 24px; font-weight: bold; letter-spacing: 2px;">SUBSCRIPTION</span>
    </a>
</div>


<div style="position: absolute; top: 15px; right: 25px; z-index: 10; background-color: Gray; padding: 10px 20px; border-radius: 8px; border: 1px solid white;">
    <a href="login.html" style="text-decoration: none; color: white; display: flex; align-items: center; gap: 12px;">
        <img src="profile.png" width="35px" style="display: block;">
        <span style="font-size: 24px; font-weight: bold; letter-spacing: 2px;">LOG IN</span>
    </a>
</div>


<div style="position: relative; width: 100%; overflow: hidden; border-bottom: 3px solid #5ab9d1; box-shadow: 0 4px 15px rgba(90, 185, 209, 0.4);">
    <img src="banner.PNG" style="width: 100%; height: auto; display: block;">
</div>


<div style="background-color: #2c3e50; border: 1px solid rgba(255,255,255,0.2); border-radius: 0 20px 20px 0; margin-top: 20px; width: 15%; min-height: 600px; padding-bottom: 30px; float: left; box-shadow: 4px 0 15px rgba(0,0,0,0.3);">
    <a href="index.html" style="text-decoration: none; display: block; margin-top: 25px; padding: 10px 15px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 18px; letter-spacing: 2px;">
            <img src="house.png" width="45px" style="margin-right: 15px;"> H O M E
        </h2>
    </a>
    <a href="about.html" style="text-decoration: none; display: block; margin-top: 15px; padding: 10px 15px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 18px; letter-spacing: 2px;">
            <img src="line.png" width="45px" style="margin-right: 15px;"> A B O U T
        </h2>
    </a>
    <a href="gallery.html" style="text-decoration: none; display: block; margin-top: 15px; padding: 10px 15px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 18px; letter-spacing: 2px;">
            <img src="music.PNG" width="45px" style="margin-right: 15px;"> G A L L E R Y
        </h2>
    </a>
    <a href="contact.html" style="text-decoration: none; display: block; margin-top: 15px; padding: 10px 15px;">
        <h2 style="color: white; display: flex; align-items: center; margin: 0; font-size: 18px; letter-spacing: 2px;">
            <img src="profile.png" width="45px" style="margin-right: 15px;"> C O N T A C T
        </h2>
    </a>
</div>


<div style="width: 82%; float: right; padding: 20px; box-sizing: border-box;">
    
 
    <div style="background: #2c3e50; padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); position: relative;">
        <h2 style="color: white; margin: 0 0 10px 0; letter-spacing: 2px; font-size: 20px;">EXPLORE</h2>
        <div style="position: relative; display: flex; align-items: center;">
            <input type="text" id="searchInput" placeholder="Search Track..." style="width: 100%; padding: 12px; border-radius: 8px; border: none; background: #36454F; color: white; font-size: 16px; outline: none; border-bottom: 2px solid #5ab9d1;">
        </div>
    </div>

   
    <h2 style="color: white; letter-spacing: 2px; border-left: 5px solid #5ab9d1; padding-left: 15px; margin-bottom: 20px;">LIBRARY</h2>
    <div id="trackContainer" style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 40px;">
        
        
        <div onclick="playMusic('Fight Me Bite Me', 'Fight Me Bite Me.mp3', 'Fight.PNG')" style="width: 180px; cursor: pointer; text-align: center; background: #2c3e50; padding: 15px; border-radius: 15px; transition: 0.3s;" class="track-card">
            <img src="Fight.PNG" style="width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover;">
            <p style="color: white; font-weight: bold; margin-top: 10px; font-size: 14px;">Fight Me Bite Me</p>
        </div>

        
        <div onclick="playMusic('Therefore You and Me', 'Therefore You and Me.mp3', 'Therefore.PNG')" style="width: 180px; cursor: pointer; text-align: center; background: #2c3e50; padding: 15px; border-radius: 15px; transition: 0.3s;" class="track-card">
            <img src="Therefore.PNG" style="width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover;">
            <p style="color: white; font-weight: bold; margin-top: 10px; font-size: 14px;">Therefore You and Me</p>
        </div>

       
        <div onclick="playMusic('Home', 'Home.mp3', 'Home.png')" style="width: 180px; cursor: pointer; text-align: center; background: #2c3e50; padding: 15px; border-radius: 15px; transition: 0.3s;" class="track-card">
            <img src="Home.png" style="width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover;">
            <p style="color: white; font-weight: bold; margin-top: 10px; font-size: 14px;">Home</p>
        </div>
    </div>

    
    <h2 style="color: white; letter-spacing: 2px; border-left: 5px solid #5ab9d1; padding-left: 15px; margin-bottom: 20px;">PLAYLISTS</h2>
    <div style="display: flex; gap: 20px; margin-bottom: 40px;">
        <img src="Playlist1.png" style="width: 150px; height: 150px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); object-fit: cover;">
        <img src="Playlist2.png" style="width: 150px; height: 150px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); object-fit: cover;">
        <img src="Playlist3.png" style="width: 150px; height: 150px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); object-fit: cover;">
    </div>

    
    <div style="background: #2c3e50; padding: 20px; border-radius: 15px; color: #5ab9d1; text-align: center; border: 1px dashed #5ab9d1;">
        <h3 style="margin: 0; letter-spacing: 2px;">PERSONAL STATS</h3>
        <p style="color: white; font-size: 14px; margin: 10px 0 0 0;">
            Tracks Played: <span id="statCount" style="font-weight: bold; color: #5ab9d1;">0</span> | 
            Added to Playlist: <span style="font-weight: bold; color: #5ab9d1;">3</span> | 
            Mood: Chill
        </p>
    </div>
</div>


<div id="playerBar" style="position: fixed; bottom: 0; left: 0; width: 100%; height: 90px; background: #1a252f; border-top: 3px solid #5ab9d1; display: flex; align-items: center; padding: 0 40px; box-sizing: border-box; z-index: 10000; visibility: hidden; box-shadow: 0 -4px 15px rgba(0,0,0,0.5);">
    <img id="playerImg" src="" style="width: 60px; height: 60px; border-radius: 8px; margin-right: 20px; border: 1px solid #5ab9d1;">
    <div style="flex: 1;">
        <p id="playerTitle" style="color: white; margin: 0; font-weight: bold; font-size: 18px; letter-spacing: 1px;">Song Title</p>
        <p style="color: #5ab9d1; margin: 0; font-size: 13px;">Now Playing • VibeStream Pro</p>
    </div>
   
    <audio id="mainAudio" controls style="filter: invert(1) hue-rotate(180deg); height: 40px;"></audio>
</div>

<script>
    let tracksPlayed = 0;

    
    function playMusic(title, file, img) {
        const playerBar = document.getElementById('playerBar');
        const audio = document.getElementById('mainAudio');
        const statDisplay = document.getElementById('statCount');

        
        playerBar.style.visibility = 'visible';
        document.getElementById('playerTitle').innerText = title;
        document.getElementById('playerImg').src = img;
        
        
        audio.src = file;
        audio.play();

        
        tracksPlayed++;
        statDisplay.innerText = tracksPlayed;
    }

    
    document.getElementById('searchInput').addEventListener('keyup', function() {
        let filter = this.value.toUpperCase();
        let cards = document.getElementsByClassName('track-card');
        
        for (let i = 0; i < cards.length; i++) {
            let titleText = cards[i].innerText;
            if (titleText.toUpperCase().indexOf(filter) > -1) {
                cards[i].style.display = "block";
                
                cards[i].style.width = (filter === "") ? "180px" : "140px";
            } else {
                cards[i].style.display = "none";
            }
        }
    });
</script>

</body>
</html>
