<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reservation</title>
</head>
<body style="margin: 0; padding: 0; background-color: #fefaf0; font-family: 'Trebuchet MS', sans-serif; color: #4a3b5a; display: flex; flex-direction: column; height: 100vh; overflow: hidden;">


    <nav style="background: linear-gradient(to right, #5c4b7a, #7e6b9e), linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(0,0,0,0.08) 100%); background-blend-mode: multiply; padding: 5px 50px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 1000; border-bottom: 1px solid rgba(43, 0, 82, 0.05);">
        <a href="home.html">
            <img src="logo.png" alt="Luna Vista Logo" style="height: 45px; filter: drop-shadow(0px 3px 6px rgba(43, 0, 82, 0.5));">
        </a>
        <div style="display: flex; gap: 35px; align-items: center;">
            <a href="home.html" style="text-decoration: none; color: #e9e4f0; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: bold;">
                <img src="house.png" width="20" style="margin-bottom: 2px;"> HOME
            </a>
            <a href="gallery.html" style="text-decoration: none; color: #e9e4f0; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: bold;">
                <img src="gallery.png" width="20" style="margin-bottom: 2px;"> GALLERY
            </a>
            <a href="reservation.html" style="text-decoration: none; color: #f4d03f; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: bold;">
                <img src="reserve.png" width="20" style="margin-bottom: 2px;"> RESERVATION
            </a>
            <a href="login.html" style="text-decoration: none; color: #e9e4f0; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: bold;">
                <img src="profile.png" width="20" style="margin-bottom: 2px;"> LOG IN
            </a>
        </div>
    </nav>

    
    <main style="flex: 1; max-width: 1300px; width: 95%; margin: auto; display: flex; gap: 40px; align-items: center; padding: 10px 0;">
        
     
        <section style="flex: 1.4; background: white; border-radius: 15px; border: 3px solid #d1c4e9; box-shadow: 12px 12px 0px #5c4b7a; overflow: hidden; display: flex; flex-direction: column;">
            <div style="position: relative; width: 100%; height: 60vh; overflow: hidden;">
                <div id="resCarousel" style="display: flex; width: 300%; height: 100%; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);">
                    <img src="1bed.JPG" style="width: 33.33%; object-fit: cover;">
                    <img src="2bed.JPG" style="width: 33.33%; object-fit: cover;">
                    <img src="3bed.JPG" style="width: 33.33%; object-fit: cover;">
                </div>
                <button onclick="moveRes(-1)" style="position: absolute; top: 50%; left: 15px; transform: translateY(-50%); background: rgba(92,75,122,0.7); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 24px; z-index: 5;">❮</button>
                <button onclick="moveRes(1)" style="position: absolute; top: 50%; right: 15px; transform: translateY(-50%); background: rgba(92,75,122,0.7); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 24px; z-index: 5;">❯</button>
            </div>
            <div style="padding: 15px; text-align: center; background: #fff; border-top: 1px solid #f0ecf7;">
                <h2 id="roomTitle" style="margin: 0; color: #2E8B57; font-size: 1.6rem; transition: color 0.5s ease;">Archives Standard Room</h2>
                <p id="roomDesc" style="color: #6b5b7b; font-size: 1rem; margin: 5px 0 0 0;">A serene, greenish sanctuary inspired by quiet contemplation.</p>
            </div>
        </section>

        
        <section style="flex: 1; background: white; padding: 30px; border-radius: 15px; border: 3px solid #d1c4e9; box-shadow: 12px 12px 0px #7e6b9e; display: flex; flex-direction: column; justify-content: center;">
            <h1 style="margin-top: 0; color: #4B0082; font-size: 1.8rem; margin-bottom: 5px;">Reservation Form</h1>
            <p style="color: #6b5b7b; margin-bottom: 20px; font-size: 0.9rem;">Complete your details to secure your stay.</p>

            
            <form style="display: flex; flex-direction: column; gap: 12px;" onsubmit="event.preventDefault(); alert('Reservation recorded! Returning to home page...'); window.location.href='home.html';">
                <div>
                    <label style="display: block; font-weight: bold; margin-bottom: 3px; font-size: 0.8rem;">Full Name</label>
                    <input type="text" placeholder="Dr. Veritas Ratio" style="width: 100%; padding: 10px; border: 2px solid #e9e4f0; border-radius: 5px; box-sizing: border-box;" required>
                </div>

                <div style="display: flex; gap: 12px;">
                    <div style="flex: 1.5;">
                        <label style="display: block; font-weight: bold; margin-bottom: 3px; font-size: 0.8rem;">Email Address</label>
                        <input type="email" placeholder="ratio@guild.com" style="width: 100%; padding: 10px; border: 2px solid #e9e4f0; border-radius: 5px; box-sizing: border-box;" required>
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-weight: bold; margin-bottom: 3px; font-size: 0.8rem;">Phone Number</label>
                        <input type="tel" placeholder="0912 345 6789" style="width: 100%; padding: 10px; border: 2px solid #e9e4f0; border-radius: 5px; box-sizing: border-box;" required>
                    </div>
                </div>

                <div style="display: flex; gap: 12px;">
                    <div style="flex: 1;">
                        <label style="display: block; font-weight: bold; margin-bottom: 3px; font-size: 0.8rem;">Check-In</label>
                        <input type="date" style="width: 100%; padding: 10px; border: 2px solid #e9e4f0; border-radius: 5px; box-sizing: border-box;" required>
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-weight: bold; margin-bottom: 3px; font-size: 0.8rem;">Check-Out</label>
                        <input type="date" style="width: 100%; padding: 10px; border: 2px solid #e9e4f0; border-radius: 5px; box-sizing: border-box;" required>
                    </div>
                </div>

                <div style="display: flex; gap: 12px;">
                    <div style="flex: 1.5;">
                        <label style="display: block; font-weight: bold; margin-bottom: 3px; font-size: 0.8rem;">Room Type</label>
                        <select style="width: 100%; padding: 10px; border: 2px solid #e9e4f0; border-radius: 5px; box-sizing: border-box;" required>
                            <option value="">Choose room</option>
                            <option>Archives Standard Room</option>
                            <option>Memorial Deluxe Suite</option>
                            <option>Veritas Intellectual Suite</option>
                        </select>
                    </div>
                    <div style="flex: 0.5;">
                        <label style="display: block; font-weight: bold; margin-bottom: 3px; font-size: 0.8rem;">Guests</label>
                        <input type="number" min="1" max="12" value="1" style="width: 100%; padding: 10px; border: 2px solid #e9e4f0; border-radius: 5px; box-sizing: border-box;" required>
                    </div>
                </div>

                <div>
                    <label style="display: block; font-weight: bold; margin-bottom: 3px; font-size: 0.8rem;">Special Requests</label>
                    <textarea rows="2" placeholder="Dietary needs, Dr. Ratio consultation, etc." style="width: 100%; padding: 10px; border: 2px solid #e9e4f0; border-radius: 5px; box-sizing: border-box; font-family: sans-serif; resize: none; font-size: 0.85rem;"></textarea>
                </div>

                <button type="submit" style="background: #5c4b7a; color: white; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 5px; font-size: 0.9rem;">CONFIRM RESERVATION</button>
            </form>
        </section>
    </main>

    
    <footer style="padding: 15px; text-align: center; background-color: #e9e4f0; border-top: 1px solid #d1c4e9; flex-shrink: 0;">
        <p style="color: #7e6b9e; font-size: 0.7rem; letter-spacing: 2px; margin: 0; font-weight: bold;">&copy; 2026 LUNA VISTA RESORT | FUNDED BY AVENTURINE</p>
    </footer>

    <script>
        let resPos = 0;
        const rooms = [
            { title: "Archives Standard Room", desc: "A serene, greenish sanctuary inspired by quiet contemplation.", color: "#2E8B57" },
            { title: "Memorial Deluxe Suite", desc: "A vibrant retreat designed for capturing precious memories.", color: "#FF69B4" },
            { title: "Veritas Intellectual Suite", desc: "Premium purple-clad luxury for the truly brilliant scholar.", color: "#4B0082" }
        ];

        function moveRes(dir) {
            resPos = (resPos + dir + 3) % 3;
            updateCarousel();
        }

        function updateCarousel() {
            document.getElementById('resCarousel').style.transform = `translateX(-${(resPos * 100) / 3}%)`;
            const titleEl = document.getElementById('roomTitle');
            titleEl.innerText = rooms[resPos].title;
            titleEl.style.color = rooms[resPos].color;
            document.getElementById('roomDesc').innerText = rooms[resPos].desc;
        }

        setInterval(() => moveRes(1), 6000);
    </script>
</body>
</html>
