<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --accent-yellow: #ffee00;
            --soft-purple: #bc13fe;
            --very-dark-purple: #0a0316;
            --bg-black: #050505;
            --card-bg: #121212;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-black);
            color: #fff;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #110429 0%, #050505 100%);
        }

        .circle-outline {
            position: absolute;
            border: 2px solid var(--accent-yellow);
            border-radius: 50%;
            opacity: 0.2;
            animation: scrollRight 5s linear infinite;
            left: -300px;
        }

        @keyframes scrollRight {
            0% { transform: translateX(0); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateX(calc(100vw + 400px)); opacity: 0; }
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--very-dark-purple);
            border-bottom: 1px solid rgba(188, 19, 254, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
        }

        .logo span {
            background: linear-gradient(to right, var(--soft-purple), var(--accent-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; gap: 10px; }

        .nav-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item:hover {
            border-color: var(--accent-yellow);
            background: var(--accent-yellow);
            color: #000;
            transform: translateY(-8px) scale(1.1);
        }

        .container { padding: 40px; max-width: 1400px; margin: auto; }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            border-left: 8px solid var(--accent-yellow);
            padding-left: 20px;
        }

        #list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .ticket-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            box-shadow: 8px 8px 0px var(--accent-yellow);
            transition: 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .ticket-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--accent-yellow);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 21/9;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .card-info { padding: 15px; flex-grow: 1; }

        .ticket-name { font-weight: 800; font-size: 0.95rem; margin-bottom: 5px; color: #fff; line-height: 1.2; }
        .ticket-venue { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .ticket-price { font-weight: 900; color: var(--soft-purple); font-size: 1rem; }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            padding: 8px;
            margin: 0 15px 15px 15px;
            border-radius: 10px;
        }

        .qty-btn {
            background: #fff;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
        }

        .qty-btn:hover { background: var(--accent-yellow); transform: scale(1.1); }

        .qty-num { font-weight: 800; font-size: 1.1rem; min-width: 20px; text-align: center; }

        .total-section {
            margin-top: 50px;
            background: var(--very-dark-purple);
            padding: 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid var(--accent-yellow);
            box-shadow: 10px 10px 0px var(--soft-purple);
        }

        .total-text { font-size: 1.5rem; font-weight: 800; }
        .total-amount { color: var(--accent-yellow); font-size: 2rem; font-weight: 900; }

        .order-btn {
            padding: 15px 40px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .order-btn:hover {
            background: var(--soft-purple);
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--soft-purple);
        }

        footer { height: 100px; }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="circle-outline" style="width:80px; height:80px; top:10%; animation-delay:0s;"></div>
        <div class="circle-outline" style="width:150px; height:150px; top:40%; animation-delay:1s;"></div>
        <div class="circle-outline" style="width:40px; height:40px; top:70%; animation-delay:2s;"></div>
        <div class="circle-outline" style="width:120px; height:120px; top:25%; animation-delay:0.5s;"></div>
        <div class="circle-outline" style="width:60px; height:60px; top:85%; animation-delay:3.5s;"></div>
        <div class="circle-outline" style="width:200px; height:200px; top:55%; animation-delay:1.5s;"></div>
        <div class="circle-outline" style="width:30px; height:30px; top:5%; animation-delay:4.5s;"></div>
    </div>

    <nav class="navbar">
        <div class="logo">NEXUS <span>EVENTS</span></div>
        <div class="nav-links">
            <a href="events.html" class="nav-item">Events</a>
            <a href="tickets.html" class="nav-item">Tickets</a>
            <a href="index.html" class="nav-item" style="color: var(--accent-yellow);">Log Out</a>
        </div>
    </nav>

    <div class="container">
        <h2>Order Tickets</h2>

        <div id="list"></div>

        <div class="total-section">
            <div class="total-text">
                TOTAL: <span class="total-amount">PHP <span id="total">0</span></span>
            </div>
            <button class="order-btn" onclick="orderNow()">Order Now 🎟️</button>
        </div>
    </div>

    <footer></footer>

    <script>
    var events=[
        {
            name:"Lyney’s Magic Show",
            venue:"Opera Epiclese",
            price:500,
            qty:0,
            img:"https://upload-os-bbs.hoyolab.com/upload/2023/08/17/17138284/18d938ce0a1668ae64579598a13ba3ca_7110668677785919574.png?x-oss-process=image%2Fresize%2Cs_1000%2Fauto-orient%2C0%2Finterlace%2C1%2Fformat%2Cwebp%2Fquality%2Cq_70"
        },
        {
            name:"Lantern Rite 2026",
            venue:"Liyue Harbor",
            price:350,
            qty:0,
            img:"https://preview.redd.it/real-talk-though-does-anyone-have-a-list-of-all-the-limited-v0-7k5nsu63p5ge1.jpeg?width=640&crop=smart&auto=webp&s=6f3b46f0400c0346455e82c277f92a39e88aef2e"
        },
        {
            name:"Fontaine Archon Opera",
            venue:"Opera Epiclese",
            price:500,
            qty:0,
            img:"https://assetsio.gnwcdn.com/Genshin-Impact-4.2-release-date%2C-4.2-Banner-and-event-details-cover.jpg?width=690&quality=85&format=jpg&dpr=3&auto=webp"
        },
        {
            name:"Archons’ Fan Signing Event",
            venue:"Opera Epiclese",
            price:700,
            qty:0,
            img:"https://hoyo.global/wp-content/uploads/2023/10/3rd-anniversary-official-wallpaper-genshin.jpg"
        }
    ];

    function render(){
        var html="";
        var total=0;
        events.forEach((e,i)=>{
            total+=e.qty*e.price;
            html+=`
            <div class="ticket-card">
                <img src="${e.img}" class="card-img">
                <div class="card-info">
                    <div class="ticket-name">${e.name}</div>
                    <div class="ticket-venue">${e.venue}</div>
                    <div class="ticket-price">PHP ${e.price}</div>
                </div>
                <div class="controls">
                    <button class="qty-btn" onclick="change(${i},-1)">-</button>
                    <span class="qty-num">${e.qty}</span>
                    <button class="qty-btn" onclick="change(${i},1)">+</button>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML=html;
        document.getElementById("total").innerText=total;
    }

    function change(i,v){
        events[i].qty+=v;
        if(events[i].qty<0)events[i].qty=0;
        render();
    }

    function orderNow(){
        if(document.getElementById("total").innerText == "0") {
            alert("Cart is empty!");
            return;
        }
        alert("Order Confirmed!");
        window.location.href="events.html";
    }

    render();
    </script>
</body>
</html>
